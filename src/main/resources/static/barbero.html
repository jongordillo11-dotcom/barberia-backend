<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Barbero - Barbería J</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-wrapper bg-dark text-white">

<div class="app-wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header border-bottom border-secondary pb-3 mb-4 mt-2 text-center">
            <span class="fs-4 text-gold fw-bold"><i class="bi bi-scissors"></i> Barbería J</span>
            <p class="small text-white opacity-75 mb-0">Panel Barbero</p>
        </div>
        <ul class="nav flex-column sidebar-nav">
            <li class="nav-item">
                <a class="nav-link active" href="#" onclick="mostrarSeccion(event, 'dashboard')">
                    <i class="bi bi-graph-up"></i> Mis Estadísticas
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="mostrarSeccion(event, 'agenda')">
                    <i class="bi bi-calendar3"></i> Mi Agenda
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="mostrarSeccion(event, 'citas')">
                    <i class="bi bi-list-check"></i> Gestionar Citas
                </a>
            </li>
        </ul>
        <div class="sidebar-footer mt-auto pt-3 border-top border-secondary">
            <button onclick="cerrarSesion()" class="btn btn-outline-danger w-100 btn-sm"><i class="bi bi-box-arrow-left"></i> Salir</button>
        </div>
    </nav>

    <main class="main-content p-3 p-md-4">
        <header class="header-bar d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
            <div class="d-flex align-items-center">
                <button class="btn btn-gold d-lg-none me-3" id="boton-menu">
                    <i class="bi bi-list fs-3"></i>
                </button>
                <h4 class="text-gold mb-0 fw-bold" id="titulo-seccion">Mis Estadísticas</h4>
            </div>
            <div class="user-info d-flex align-items-center">
                <span id="nombre-barbero" class="text-gold fw-bold me-2 d-none d-sm-inline">Cargando...</span>
                <i class="bi bi-person-circle fs-4 text-gold"></i>
            </div>
        </header>

        <div id="seccion-dashboard" class="content-section">
            <div class="row g-3 g-md-4 mb-4">
                <div class="col-12 col-md-4">
                    <div class="card premium-card p-4 border-start border-5 border-success">
                        <h6 class="text-white small text-uppercase fw-bold">Cortes Realizados</h6>
                        <h2 id="stats-semanales" class="mb-0 text-white">0</h2>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card premium-card p-4 border-start border-5 border-info">
                        <h6 class="text-white small text-uppercase fw-bold">Comisión Est. (20%)</h6>
                        <h2 id="stats-ganancias" class="mb-0 text-white">0.00€</h2>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card premium-card p-4 border-start border-5 border-warning">
                        <h6 class="text-white small text-uppercase fw-bold">Citas para Hoy</h6>
                        <h2 id="stats-hoy" class="mb-0 text-white">0</h2>
                    </div>
                </div>
            </div>
            <div class="card premium-card p-4">
                <h5 class="text-gold mb-3 fw-bold">Mi Actividad</h5>
                <div id="chart-barbero"></div>
            </div>
        </div>

        <div id="seccion-agenda" class="content-section d-none">
            <div class="card premium-card p-1 p-md-4">
                <div id="calendar-barbero"></div>
            </div>
        </div>

        <div id="seccion-citas" class="content-section d-none">
            <div class="table-responsive premium-card p-2">
                <table class="table table-dark table-hover align-middle text-center mb-0">
                    <thead class="text-gold">
                    <tr>
                        <th>Hora</th>
                        <th>Cliente</th>
                        <th>Servicio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tabla-citas-barbero" class="text-white"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/barbero.js"></script>

<script>
    const btn = document.getElementById('boton-menu');
    const menu = document.getElementById('sidebar');

    btn.addEventListener('click', () => {
        menu.classList.toggle('show-mobile');
    });

    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                menu.classList.remove('show-mobile');
            }
        });
    });
</script>
</body>
</html>
