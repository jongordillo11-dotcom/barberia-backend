<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Barbería J</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body:not(.app-wrapper):not(.index-page) {
            align-items: flex-start !important;
        }
        .login-card {
            margin: auto; /* Centra la caja respetando el scroll */
        }
    </style>
</head>
<body>
<div class="login-card p-4 p-md-5 shadow-lg w-100" style="max-width: 400px;">
    <div class="text-center mb-4">
        <h1 class="text-gold fw-bold mb-2 display-6">Barbería J</h1>
        <p class="login-subtitle text-white opacity-75 small text-uppercase tracking-wider">Accede a tu zona privada</p>
    </div>

    <form onsubmit="manejarLogin(event)">
        <div class="mb-3">
            <label class="form-label text-white small fw-bold">Email</label>
            <input type="email" id="email" class="form-control form-control-lg bg-dark text-white border-secondary" placeholder="admin@barberia.com" required>
        </div>

        <div class="mb-4">
            <label class="form-label text-white small fw-bold">Contraseña</label>
            <div class="input-group">
                <input type="password" id="password" class="form-control form-control-lg bg-dark text-white border-secondary border-end-0" placeholder="••••••••" required>
                <button class="btn border-secondary border-start-0 text-gold" type="button" onclick="togglePassword('password', 'ojo-login')" style="background-color: #212529;">
                    <i class="bi bi-eye-slash" id="ojo-login"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-gold btn-lg w-100 py-3 mb-3 fw-bold shadow">ENTRAR</button>
    </form>

    <div class="text-center mt-4">
        <p class="small mb-1 text-white opacity-75">¿Aún no tienes cuenta?</p>
        <a href="registro.html" class="text-gold fw-bold text-decoration-none d-inline-block mt-1 transition-transform border-bottom border-warning pb-1" style="letter-spacing: 1px; font-size: 0.85rem;">
            CREAR UNA CUENTA NUEVA
        </a>
    </div>

    <div class="text-center mt-4 pt-4 border-top border-secondary border-opacity-25">
        <a href="index.html" class="text-white text-decoration-none small d-inline-flex align-items-center fw-bold">
            <i class="bi bi-arrow-left me-2 fs-5"></i> Volver a la web
        </a>
    </div>
</div>

<script src="js/auth.js"></script>
<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);

        // Lógica corregida para alternar el ojito
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye"); // Ojo abierto
        } else {
            input.type = "password";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash"); // Ojo tachado
        }
    }
</script>
</body>
</html>
