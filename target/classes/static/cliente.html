<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Área | Barbería J</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="index-page bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark fixed-top border-bottom border-secondary" style="background-color: rgba(10,10,10,0.98); backdrop-filter: blur(10px);">
    <div class="container">
        <a class="navbar-brand text-gold fs-3 fw-bold" href="#"><i class="bi bi-scissors me-2"></i>Barbería J</a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link active client-nav-link text-white fw-bold" href="#" onclick="mostrarSeccion('servicios', this)"><i class="bi bi-stars me-1 text-gold"></i> Servicios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link client-nav-link text-white fw-bold" href="#" onclick="mostrarSeccion('mis-citas', this)"><i class="bi bi-calendar-check me-1 text-gold"></i> Mis Citas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link client-nav-link text-white fw-bold" href="#" onclick="mostrarSeccion('tienda', this)"><i class="bi bi-bag me-1 text-gold"></i> Tienda</a>
                </li>
            </ul>
            <div class="d-flex flex-column flex-lg-row align-items-center mt-3 mt-lg-0 gap-3">
                <span id="cliente-nombre" class="text-white fw-bold">...</span>
                <button class="btn btn-outline-danger btn-sm w-100 w-lg-auto" onclick="cerrarSesion()"><i class="bi bi-box-arrow-left"></i> Salir</button>
            </div>
        </div>
    </div>
</nav>

<div class="container px-3">

    <div style="height: 120px;" class="d-block"></div>

    <header class="mb-5 text-center">
        <h1 id="titulo-seccion" class="font-elegant text-gold h2 display-md-5 fw-bold mb-3">Nuestros Servicios</h1>
        <div class="mx-auto mt-2" style="height: 3px; width: 60px; background-color: #d4af37;"></div>
    </header>

    <div id="seccion-servicios" class="content-view px-2">
        <div class="row g-4 justify-content-center" id="galeria-servicios"></div>
    </div>

    <div id="seccion-reserva" class="content-view d-none px-2">
        <div class="text-center mb-4">
            <button class="btn btn-outline-gold w-100 w-md-auto" onclick="mostrarSeccion('servicios', document.querySelector('.client-nav-link'))">
                <i class="bi bi-arrow-left"></i> Volver a Servicios
            </button>
        </div>

        <div class="card premium-card p-3 p-md-5 shadow-lg mx-auto border-secondary" style="max-width: 900px; background-color: #161616;">
            <h2 id="reserva-servicio-nombre" class="text-gold font-elegant mb-5 text-center fw-bold">Confirmar Reserva</h2>

            <div class="row g-5">
                <div class="col-12 col-lg-6 border-lg-end border-secondary mb-4 mb-lg-0">
                    <label class="form-label text-gold fw-bold mb-4 d-block text-uppercase small" style="letter-spacing: 2px;">1. Elige tu Barbero</label>
                    <div id="contenedor-barberos" class="row g-3"></div>
                </div>

                <div class="col-12 col-lg-6 ps-lg-5">
                    <div class="mb-4">
                        <label class="form-label text-gold fw-bold mb-3 d-block text-uppercase small" style="letter-spacing: 2px;">2. Elige el Día</label>
                        <input type="date" id="fecha-reserva" class="form-control form-control-lg bg-dark text-white border-secondary shadow-sm" onchange="buscarHorasLibres()">
                    </div>

                    <div class="mb-5">
                        <label class="form-label text-gold fw-bold mb-3 d-none text-uppercase small" id="label-horas" style="letter-spacing: 2px;">3. Selecciona la Hora</label>
                        <div id="contenedor-horas" class="d-flex flex-wrap gap-2 justify-content-center justify-content-lg-start"></div>
                        <input type="hidden" id="hora-seleccionada">
                    </div>

                    <button class="btn btn-gold btn-lg w-100 fw-bold py-3 shadow-lg" onclick="confirmarReserva()">
                        <i class="bi bi-check-circle-fill me-2"></i> CONFIRMAR CITA
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="seccion-mis-citas" class="content-view d-none px-2">
        <div class="card premium-card p-2 p-md-4 shadow mx-auto border-secondary" style="max-width: 1000px; background-color: #161616;">
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0 text-center">
                    <thead class="text-gold border-bottom border-secondary">
                    <tr>
                        <th class="py-3">Fecha</th>
                        <th class="py-3">Servicio</th>
                        <th class="py-3">Barbero</th>
                        <th class="py-3">Estado</th>
                        <th class="py-3">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tabla-mis-citas" class="text-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="seccion-tienda" class="content-view d-none px-2">
        <div class="row g-4 justify-content-center pt-4" id="galeria-tienda"></div>
    </div>
</div>

<script src="js/cliente.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
